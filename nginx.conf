# Nginx 配置 - API 服务负载均衡
# 处理 FastAPI 协程层请求

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

    # 上游 API 服务
    upstream api_backend {
        least_conn;  # 最少连接优先，让负载更均匀

        server api-worker-1:8000 weight=1 max_fails=3 fail_timeout=30s;
        server api-worker-2:8000 weight=1 max_fails=3 fail_timeout=30s;
        server api-worker-3:8000 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 32;  # 长连接池
    }

    server {
        listen 80;
        server_name _;

        # 健康检查端点
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # SSE 流式请求 - 禁用缓冲
        location /chat/stream {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            # SSE 需要
            proxy_set_header Connection '';
            proxy_set_header Accept 'text/event-stream';
            proxy_set_header Cache-Control 'no-cache';

            # 禁用缓冲，确保实时流
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;

            # 传递真实 IP
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 审批端点
        location /chat/approve {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 历史查询端点
        location /chat/history {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 默认 API 路由
        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
