<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 800px;
            max-width: 90vw;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #4a90d9;
            color: white;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 500;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #4a90d9;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #f0f2f5;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }

        .message.tool {
            align-self: flex-start;
            background: #fff3cd;
            color: #856404;
            border-bottom-left-radius: 4px;
            font-size: 14px;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 16px;
            background: #f0f2f5;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            margin-right: 4px;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #4a90d9;
        }

        .send-btn {
            padding: 12px 24px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #3a7bc8;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .approval-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .approval-modal.active {
            display: flex;
        }

        .approval-dialog {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
        }

        .approval-dialog h3 {
            margin-bottom: 12px;
            color: #d9534f;
        }

        .approval-dialog p {
            margin-bottom: 16px;
            color: #666;
        }

        .approval-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .approval-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .approval-btn.confirm {
            background: #5cb85c;
            color: white;
        }

        .approval-btn.cancel {
            background: #d9534f;
            color: white;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Customer Support Assistant</div>
        <div class="chat-messages" id="messages">
            <div class="message assistant">
                Hello! I'm your travel assistant. How can I help you today?
            </div>
        </div>
        <div class="chat-input-area">
            <input
                type="text"
                class="chat-input"
                id="userInput"
                placeholder="Type your message..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div class="approval-modal" id="approvalModal">
        <div class="approval-dialog">
            <h3>Confirm Action</h3>
            <p id="approvalMessage">A sensitive action requires your confirmation.</p>
            <div class="approval-buttons">
                <button class="approval-btn cancel" onclick="denyAction()">Cancel</button>
                <button class="approval-btn confirm" onclick="approveAction()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let threadId = null;
        let pendingApproval = false;
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const approvalModal = document.getElementById('approvalModal');

        function addMessage(content, type = 'assistant') {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = content;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return msg;
        }

        function showTyping() {
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typing';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(indicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function setInputEnabled(enabled) {
            userInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || sendBtn.disabled) return;

            setInputEnabled(false);
            addMessage(message, 'user');
            userInput.value = '';
            showTyping();

            try {
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        passenger_id: '5102 899977',
                        thread_id: threadId
                    })
                });

                hideTyping();
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMsg = addMessage('', 'assistant');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.startsWith('data:')) continue;

                        const dataStr = line.slice(5).trim();
                        if (!dataStr) continue;

                        try {
                            const data = JSON.parse(dataStr);

                            if (data.type === 'AIMessage' || data.type === 'HumanMessage') {
                                assistantMsg.textContent += data.content;
                                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                            } else if (data.type === 'ToolMessage') {
                                addMessage(data.content, 'tool');
                            } else if (data.event === 'interrupt') {
                                pendingApproval = true;
                                approvalModal.classList.add('active');
                            } else if (data.event === 'done') {
                                threadId = data.thread_id;
                            }
                        } catch (e) {
                            // Ignore parse errors for partial data
                        }
                    }
                }
            } catch (error) {
                hideTyping();
                addMessage('Error: ' + error.message, 'assistant');
            }

            setInputEnabled(true);
            userInput.focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function approveAction() {
            approvalModal.classList.remove('active');
            await sendApproval(true);
        }

        async function denyAction() {
            const feedback = prompt('Please provide a reason for denying this action:');
            if (feedback === null) return; // User cancelled
            approvalModal.classList.remove('active');
            await sendApproval(false, feedback);
        }

        async function sendApproval(approved, feedback = '') {
            if (!threadId) return;

            setInputEnabled(false);
            showTyping();

            try {
                const response = await fetch('/chat/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        thread_id: threadId,
                        approved: approved,
                        feedback: feedback
                    })
                });

                const result = await response.json();
                hideTyping();

                if (result.messages) {
                    for (const msg of result.messages) {
                        if (msg.type === 'AIMessage') {
                            addMessage(msg.content, 'assistant');
                        } else if (msg.type === 'ToolMessage') {
                            addMessage(msg.content, 'tool');
                        }
                    }
                }
            } catch (error) {
                hideTyping();
                addMessage('Error: ' + error.message, 'assistant');
            }

            setInputEnabled(true);
            pendingApproval = false;
        }
    </script>
</body>
</html>
