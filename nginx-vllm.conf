# Nginx 配置 - vLLM 集群负载均衡
# 将请求分发到多个 vLLM 实例

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志
    log_format vllm '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent $request_time_ms';

    access_log /var/log/nginx/access.log vllm;

    # 性能
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # vLLM 上游
    upstream vllm_backend {
        least_conn;  # 最少连接优先

        server vllm-1:8000 weight=1 max_fails=3 fail_timeout=30s;
        server vllm-2:8000 weight=1 max_fails=3 fail_timeout=30s;
        server vllm-3:8000 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 64;  # 较大的长连接池，因为 LLM 请求时间长
    }

    server {
        listen 80;
        server_name _;

        # 健康检查
        location /health {
            proxy_pass http://vllm_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host localhost;

            # 只检查响应状态，不关心内容
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # OpenAI 兼容 API 路由
        location /v1 {
            proxy_pass http://vllm_backend;
            proxy_http_version 1.1;

            # SSE 流式响应
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # 超时设置（LLM 生成可能需要较长时间）
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # 传递请求头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 默认路由
        location / {
            proxy_pass http://vllm_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
