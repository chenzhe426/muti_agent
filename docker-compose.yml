version: '3.8'

services:
  # ==================== Redis 集群 (状态共享) ====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== Redis Sentinel (高可用，可选) ====================
  redis-sentinel:
    image: redis:7-alpine
    command: redis-sentinel --sentinel monitor mymaster redis 6379 2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ==================== 向量数据库 ====================
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./customer_support_chat/data/qdrant_storage:/qdrant/storage
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== vLLM 集群节点 1 ====================
  vllm-1:
    image: vllm/vllm:latest
    ports:
      - "8001:8000"
    volumes:
      - ./models:/models
    environment:
      - MODEL=/models/${LLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - GPU_MEMORY_UTILIZATION=0.9
      - MAX_MODEL_LEN=8192
      - TENSOR_PARALLEL_SIZE=1
      - QUANTIZATION=fp16
      - PORT=8000
      - DTYPE=half
      - HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - vllm  # 单独启动: docker-compose --profile vllm up

  # ==================== vLLM 集群节点 2 ====================
  vllm-2:
    image: vllm/vllm:latest
    environment:
      - MODEL=/models/${LLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - GPU_MEMORY_UTILIZATION=0.9
      - MAX_MODEL_LEN=8192
      - TENSOR_PARALLEL_SIZE=1
      - QUANTIZATION=fp16
      - PORT=8000
      - DTYPE=half
      - HOST=0.0.0.0
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - vllm

  # ==================== vLLM 集群节点 3 ====================
  vllm-3:
    image: vllm/vllm:latest
    environment:
      - MODEL=/models/${LLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - GPU_MEMORY_UTILIZATION=0.9
      - MAX_MODEL_LEN=8192
      - TENSOR_PARALLEL_SIZE=1
      - QUANTIZATION=fp16
      - PORT=8000
      - DTYPE=half
      - HOST=0.0.0.0
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - vllm

  # ==================== vLLM 负载均衡 ====================
  vllm-proxy:
    image: nginx:alpine
    ports:
      - "8002:80"
    volumes:
      - ./nginx-vllm.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm-1:
        condition: service_healthy
    networks:
      - app-network
    profiles:
      - vllm

  # ==================== FastAPI Worker 1 ====================
  api-worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      # LLM 配置
      - LLM_PROVIDER=vllm
      - LLM_BASE_URL=http://vllm-proxy:80/v1
      - LLM_MODEL=${LLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      # Redis 配置 (多 Worker 共享状态)
      - CHECKPOINTER_TYPE=redis
      - REDIS_URL=redis://redis:6379
      - REDIS_MAX_CONNECTIONS=50
      - REDIS_THREAD_COUNT=10
      # 其他配置
      - OPENAI_API_KEY=dummy
      - QDRANT_URL=http://qdrant:6333
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - api

  # ==================== FastAPI Worker 2 ====================
  api-worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      - LLM_PROVIDER=vllm
      - LLM_BASE_URL=http://vllm-proxy:80/v1
      - LLM_MODEL=${LLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - CHECKPOINTER_TYPE=redis
      - REDIS_URL=redis://redis:6379
      - REDIS_MAX_CONNECTIONS=50
      - REDIS_THREAD_COUNT=10
      - OPENAI_API_KEY=dummy
      - QDRANT_URL=http://qdrant:6333
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - api

  # ==================== FastAPI Worker 3 ====================
  api-worker-3:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      - LLM_PROVIDER=vllm
      - LLM_BASE_URL=http://vllm-proxy:80/v1
      - LLM_MODEL=${LLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - CHECKPOINTER_TYPE=redis
      - REDIS_URL=redis://redis:6379
      - REDIS_MAX_CONNECTIONS=50
      - REDIS_THREAD_COUNT=10
      - OPENAI_API_KEY=dummy
      - QDRANT_URL=http://qdrant:6333
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - api

  # ==================== Nginx 负载均衡 ====================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-worker-1:
        condition: service_started
      api-worker-2:
        condition: service_started
      api-worker-3:
        condition: service_started
    networks:
      - app-network
    profiles:
      - api

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
